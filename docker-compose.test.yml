services:
    postgres-test:
        image: pgvector/pgvector:pg17
        container_name: clpr-postgres-test
        environment:
            POSTGRES_USER: clpr
            POSTGRES_PASSWORD: clpr_password
            POSTGRES_DB: clpr_test
        ports:
            - '5437:5432'
        tmpfs:
            - /var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U clpr -d clpr_test']
            interval: 5s
            timeout: 3s
            retries: 5

    redis-test:
        image: redis:7-alpine
        container_name: clpr-redis-test
        ports:
            - '6380:6379'
        tmpfs:
            - /data
        command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 5

    opensearch-test:
        image: opensearchproject/opensearch:2.11.1
        container_name: clpr-opensearch-test
        environment:
            - discovery.type=single-node
            - 'OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m'
            - 'DISABLE_SECURITY_PLUGIN=true'
            - 'DISABLE_INSTALL_DEMO_CONFIG=true'
            - 'bootstrap.system_call_filter=false'
        ports:
            - '9201:9200'
            - '9601:9600'
        volumes:
            - opensearch-test-data:/usr/share/opensearch/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'curl -f http://localhost:9200/_cluster/health || exit 1',
                ]
            interval: 5s
            timeout: 5s
            retries: 15

volumes:
    opensearch-test-data:
