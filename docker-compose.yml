networks:
  projects:
    name: projects
    external: true
  dev:
    name: dev
    external: true

services:
  clpr-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clpr-backend
    networks: [projects, dev]
    env_file: .env
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -n "$${JWT_PRIVATE_KEY_B64:-}" ]; then
          export JWT_PRIVATE_KEY=$$(echo "$$JWT_PRIVATE_KEY_B64" | base64 -d)
        fi
        if [ -n "$${JWT_PUBLIC_KEY_B64:-}" ]; then
          export JWT_PUBLIC_KEY=$$(echo "$$JWT_PUBLIC_KEY_B64" | base64 -d)
        fi
        exec ./api
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8080/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - com.centurylinklabs.watchtower.enable=false
    restart: unless-stopped

  clpr-crawler:
    build:
      context: ./backend
      dockerfile: Dockerfile.crawler
    container_name: clpr-crawler
    networks: [projects]
    env_file: .env
    environment:
      - SCRAPE_INTERVAL=1800
      - SCRAPE_MIN_VIEWS=50
      - SCRAPE_MAX_AGE_DAYS=7
      - SCRAPE_BROADCASTERS=xQc,pokimane,caseoh_,Agent00,BotezLive,Maximilian_DOOD,ohnePixel,ExtraEmily,Zoil,Elajjaz,itmeJP,APPLESHAMPOO,Bonnie,Pamaj,ashswag,shindigwow
    labels:
      - com.centurylinklabs.watchtower.enable=false
    restart: unless-stopped

  clpr-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clpr-frontend
    networks: [projects]
    depends_on:
      clpr-backend:
        condition: service_healthy
    labels:
      - com.centurylinklabs.watchtower.enable=false
    restart: unless-stopped
