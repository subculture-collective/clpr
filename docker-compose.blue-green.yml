# Blue-Green Deployment Configuration
# Allows running two versions simultaneously for zero-downtime deployments
# Switch traffic via the proxy/load balancer

services:
    # BLUE environment (current production)
    backend-blue:
        image: ghcr.io/subculture-collective/clpr/backend:${BACKEND_BLUE_TAG:-latest}
        container_name: clpr-backend-blue
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test:
                [
                    'CMD',
                    'wget',
                    '--spider',
                    '-q',
                    'http://localhost:8080/health',
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        environment:
            - PORT=8080
            - ENVIRONMENT=blue
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_USER=${POSTGRES_USER:-clpr}
            - DB_PASSWORD=${POSTGRES_PASSWORD}
            - DB_NAME=${POSTGRES_DB:-clpr_db}
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_DB=0
            - GIN_MODE=release
            - BASE_URL=${BASE_URL:-https://clpr.tv}
            - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
            - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
            - CLIP_MAX_DURATION_SECONDS=${CLIP_MAX_DURATION_SECONDS}
            - CLIP_RECOMMENDED_DURATION_SECONDS=${CLIP_RECOMMENDED_DURATION_SECONDS}
            - CLIP_MAX_UPLOAD_BYTES=${CLIP_MAX_UPLOAD_BYTES}
            - CLIP_ALLOWED_UPLOAD_MIME_TYPES=${CLIP_ALLOWED_UPLOAD_MIME_TYPES}
            - CLIP_REQUIRE_MODERATION_FOR_UPLOAD=${CLIP_REQUIRE_MODERATION_FOR_UPLOAD}
            - CLIP_STORAGE_PROVIDER=${CLIP_STORAGE_PROVIDER}
            - CLIP_STORAGE_ENDPOINT=${CLIP_STORAGE_ENDPOINT}
            - CLIP_STORAGE_BUCKET=${CLIP_STORAGE_BUCKET}
            - CLIP_STORAGE_REGION=${CLIP_STORAGE_REGION}
            - CLIP_STORAGE_ACCESS_KEY=${CLIP_STORAGE_ACCESS_KEY}
            - CLIP_STORAGE_SECRET_KEY=${CLIP_STORAGE_SECRET_KEY}
            - CLIP_STORAGE_FORCE_PATH_STYLE=${CLIP_STORAGE_FORCE_PATH_STYLE}
            - CLIP_STORAGE_PUBLIC_BASE_URL=${CLIP_STORAGE_PUBLIC_BASE_URL}
            - CLIP_MEDIA_PUBLIC_BASE_URL=${CLIP_MEDIA_PUBLIC_BASE_URL}
            - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://clpr.tv}
            - LOG_LEVEL=info
        networks:
            - clpr-network

    frontend-blue:
        image: ghcr.io/subculture-collective/clpr/frontend:${FRONTEND_BLUE_TAG:-latest}
        container_name: clpr-frontend-blue
        restart: unless-stopped
        depends_on:
            - backend-blue
        healthcheck:
            test:
                [
                    'CMD',
                    'wget',
                    '--spider',
                    '-q',
                    'http://localhost:80/health.html',
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 5s
        environment:
            - BACKEND_URL=http://backend-blue:8080
        networks:
            - clpr-network

    # GREEN environment (new version during deploy)
    backend-green:
        image: ghcr.io/subculture-collective/clpr/backend:${BACKEND_GREEN_TAG:-latest}
        container_name: clpr-backend-green
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        healthcheck:
            test:
                [
                    'CMD',
                    'wget',
                    '--spider',
                    '-q',
                    'http://localhost:8080/health',
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        environment:
            - PORT=8080
            - ENVIRONMENT=green
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_USER=${POSTGRES_USER:-clpr}
            - DB_PASSWORD=${POSTGRES_PASSWORD}
            - DB_NAME=${POSTGRES_DB:-clpr_db}
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_DB=0
            - GIN_MODE=release
            - BASE_URL=${BASE_URL:-https://clpr.tv}
            - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID}
            - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET}
            - CLIP_MAX_DURATION_SECONDS=${CLIP_MAX_DURATION_SECONDS}
            - CLIP_RECOMMENDED_DURATION_SECONDS=${CLIP_RECOMMENDED_DURATION_SECONDS}
            - CLIP_MAX_UPLOAD_BYTES=${CLIP_MAX_UPLOAD_BYTES}
            - CLIP_ALLOWED_UPLOAD_MIME_TYPES=${CLIP_ALLOWED_UPLOAD_MIME_TYPES}
            - CLIP_REQUIRE_MODERATION_FOR_UPLOAD=${CLIP_REQUIRE_MODERATION_FOR_UPLOAD}
            - CLIP_STORAGE_PROVIDER=${CLIP_STORAGE_PROVIDER}
            - CLIP_STORAGE_ENDPOINT=${CLIP_STORAGE_ENDPOINT}
            - CLIP_STORAGE_BUCKET=${CLIP_STORAGE_BUCKET}
            - CLIP_STORAGE_REGION=${CLIP_STORAGE_REGION}
            - CLIP_STORAGE_ACCESS_KEY=${CLIP_STORAGE_ACCESS_KEY}
            - CLIP_STORAGE_SECRET_KEY=${CLIP_STORAGE_SECRET_KEY}
            - CLIP_STORAGE_FORCE_PATH_STYLE=${CLIP_STORAGE_FORCE_PATH_STYLE}
            - CLIP_STORAGE_PUBLIC_BASE_URL=${CLIP_STORAGE_PUBLIC_BASE_URL}
            - CLIP_MEDIA_PUBLIC_BASE_URL=${CLIP_MEDIA_PUBLIC_BASE_URL}
            - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://clpr.tv}
            - LOG_LEVEL=info
        networks:
            - clpr-network
        profiles:
            - green # Only starts when explicitly requested

    frontend-green:
        image: ghcr.io/subculture-collective/clpr/frontend:${FRONTEND_GREEN_TAG:-latest}
        container_name: clpr-frontend-green
        restart: unless-stopped
        depends_on:
            - backend-green
        healthcheck:
            test:
                [
                    'CMD',
                    'wget',
                    '--spider',
                    '-q',
                    'http://localhost:80/health.html',
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 5s
        environment:
            - BACKEND_URL=http://backend-green:8080
        networks:
            - clpr-network
        profiles:
            - green # Only starts when explicitly requested

    # Shared Services
    postgres:
        build:
            context: .
            dockerfile: Dockerfile.postgres
        container_name: clpr-postgres
        restart: unless-stopped
        environment:
            - POSTGRES_DB=${POSTGRES_DB:-clpr_db}
            - POSTGRES_USER=${POSTGRES_USER:-clpr}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        ports:
            - '5436:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'pg_isready -U ${POSTGRES_USER:-clpr} -d ${POSTGRES_DB:-clpr_db}',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        networks:
            - clpr-network

    redis:
        image: redis:7-alpine
        container_name: clpr-redis
        restart: unless-stopped
        command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 5s
        networks:
            - clpr-network

    # Caddy reverse proxy for traffic switching
    caddy:
        image: caddy:2-alpine
        container_name: clpr-caddy
        restart: unless-stopped
        depends_on:
            - backend-blue
            - frontend-blue
        ports:
            - '80:80'
            - '443:443'
            - '2019:2019' # Caddy admin API
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
            - caddy_logs:/var/log/caddy
        environment:
            - ACTIVE_ENV=${ACTIVE_ENV:-blue}
        networks:
            - clpr-network
        healthcheck:
            test:
                [
                    'CMD',
                    'wget',
                    '--spider',
                    '-q',
                    'http://localhost:2019/config/',
                ]
            interval: 30s
            timeout: 10s
            retries: 3

volumes:
    postgres_data:
        driver: local
    redis_data:
        driver: local
    caddy_data:
        driver: local
    caddy_config:
        driver: local
    caddy_logs:
        driver: local

networks:
    clpr-network:
        driver: bridge
